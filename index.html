<!doctype html>
<html lang="en">
<head>

<title>❤️</title>

<style>

</style>
</head>

<body>

<!-- LOADING -->
<div id="loading" class="center">
    <div class="glass">
        <div class="loader"></div>
        <p class="loading-text">ثواني يا روحي معلش 😂❤️</p>
    </div>
</div>

<!-- MAIN -->
<div id="main" class="center">
    <div class="glass">

        <img src="soska 4.jpeg" />

        <p>جاهزة ❤️</p>

        <input type="password" id="pass" placeholder="اكتبي الباسورد" />
        <br>

        <button onclick="check()">يلا بسرعه افتحي ❤️</button>

    </div>
</div>

<script>
setTimeout(() => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("main").style.display = "flex";
}, 3000);

function check() {
    let p = document.getElementById("pass").value;

    if (p === "15/12/2003") {
        window.location.href = "Home.html";
    } else {
        alert("غلط 😅");
    }
}
</script>
